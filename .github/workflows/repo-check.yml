name: Repo Check

on:
  push:
  workflow_dispatch:

jobs:
  repo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show current directory
        run: pwd

      - name: List repository files
        run: ls -la

      - name: Print README
        run: cat README.md

      - name: Check if README exists
        run: ls README.md

      - name: Check if .gitignore exists
        run: ls .gitignore

      - name: Check if workflow exists
        run: ls .github/workflows/repo-check.yml

      - name: Check if README contains project header
        run: grep "# Git Block 1 Lab" README.md
