apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: py-block3-hpa
  namespace: py-block3-namespace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: py-block3-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
